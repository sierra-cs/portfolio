<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SierraCS Studio</title>
    <link rel="icon" type="favicon" href="./assets/images/favicon-fullcolor.svg">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/loading.css">
</head>
<body>
    <div class="lock-screen">
        <!-- Date and Time -->
        <div class="datetime">
            <div class="date" id="date"></div>
            <div class="time" id="time"></div>
        </div>
        <!-- Profile Logo and Login Bar -->
        <div class="login-section">
            <img src="./assets/images/primary-fullcolor.svg" alt="SierraCS Studio Logo" class="profile-logo">
            <div class="login-container">
                <input type="text" class="login-input" id="loginInput" placeholder="Click to continue..." readonly>
                <button class="arrow-button" id="arrowButton">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script src="./js/main.js"></script>
</body>
</html>
