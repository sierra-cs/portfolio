<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Works</title>
    <link rel="icon" type="favicon" href="./assets/images/favicon-fullcolor.svg">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/works.css">
</head>
<body>
    <main class="works-main">
        <div class="works-grid">
            <div class="project-card" id="portfolio">
                <div class="card-header">
                    <h3 class="project-name">SierraCS Studio Portfolio</h3>
                    <span class="project-year">2025</span>
                </div>
                <div class="card-preview">
                    <img src="./assets/images/project-previews/portfolio.png" alt="SierraCS Studio Portfolio Preview" class="preview-img">
                </div>
                <p class="tech-stack">HTML, CSS, JavaScript</p>
            </div>
            <div class="project-card" id="design-system">
                <div class="card-header">
                    <h3 class="project-name">SierraCS Studio Design System</h3>
                    <span class="project-year">2025</span>
                </div>
                <div class="card-preview">
                    <img src="./assets/images/project-previews/design-system.png" alt="SierraCS Studio Design System Preview" class="preview-img">
                </div>
                <p class="tech-stack">HTML, CSS, JavaScript</p>
            </div>
            <div class="project-card" id="cadence">
                <div class="card-header">
                    <h3 class="project-name">Cadence: Task & Habit App</h3>
                    <div class="card-header-right">
                        <span class="in-progress-badge">In Progress</span>
                        <span class="project-year">2026</span>
                    </div>
                    
                </div>
                <div class="card-preview">
                    <img src="./assets/images/project-previews/cadence.png" alt="Cadence Preview" class="preview-img">
                </div>
                <p class="tech-stack">React, JavaScript, CSS</p>
            </div>
            <div class="project-card" id="jammming">
                <div class="card-header">
                    <h3 class="project-name">Jammming</h3>
                    <span class="project-year">2026</span>
                </div>
                <div class="card-preview">
                    <img src="./assets/images/project-previews/jammming.png" alt="Jammming Preview" class="preview-img">
                </div>
                <p class="tech-stack">JavaScript, CSS, HTML</p>
            </div>
        </div>
    </main>
    <script src="./js/global.js"></script>
    <script src="./js/menu.js"></script>
    <script src="./js/works.js"></script>
</body>
</html>
